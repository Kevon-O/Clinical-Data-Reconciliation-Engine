services:
  backend:
    build:
      context: ./backend
    container_name: ehr-backend
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}

  frontend:
    build:
      context: ./frontend
    container_name: ehr-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend